name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: sudo env "PATH=$PATH" go test ./... -count=1

  goreleaser:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check --config .goreleaser.yaml

      - name: Validate GoReleaser snapshot release
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --config .goreleaser.yaml

  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build nie
        run: |
          mkdir -p dist
          CGO_ENABLED=0 go build -buildvcs=false -o dist/nie ./cmd/nie

      - name: Make loopback IPv4-only for smoke
        run: |
          sudo ip -6 addr flush dev lo
          ip -brief addr show lo

      - name: Run root smoke test against built binary
        run: |
          sudo env "PATH=$PATH" "NIE_TEST_BIN=$PWD/dist/nie" \
            go test -tags=integration ./test -run '^(TestSmoke_AuditModeAllowsUnknownTrafficButEmitsWouldDeny|TestSmoke_AuditCapturesPinnedDockerBuildDomains|TestSmoke_AuditCapturesPinnedDockerBuildDomainsWithoutHTTPSInterception|TestSmoke_EnforceBlocksUnknownTrafficUntilDNSLearning)$' -count=1 -timeout 20m -v
