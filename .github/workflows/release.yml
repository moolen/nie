name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: npm

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Capture latest tag before release
        id: before
        run: |
          git fetch --force --tags origin "+refs/heads/main:refs/remotes/origin/main"
          tag="$(git describe --tags --abbrev=0 --match 'v*' origin/main 2>/dev/null || true)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - run: npm ci

      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture latest tag after release
        id: after
        run: |
          git fetch --force --tags origin "+refs/heads/main:refs/remotes/origin/main"
          tag="$(git describe --tags --abbrev=0 --match 'v*' origin/main 2>/dev/null || true)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Check out released tag
        if: steps.after.outputs.tag != '' && steps.after.outputs.tag != steps.before.outputs.tag
        run: git checkout "${{ steps.after.outputs.tag }}"

      - name: Clean npm workspace before GoReleaser
        if: steps.after.outputs.tag != '' && steps.after.outputs.tag != steps.before.outputs.tag
        run: rm -rf node_modules

      - name: Publish release assets
        if: steps.after.outputs.tag != '' && steps.after.outputs.tag != steps.before.outputs.tag
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
