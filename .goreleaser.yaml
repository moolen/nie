version: 2

project_name: nie

builds:
  - id: nie
    main: ./cmd/nie
    binary: nie
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: nie
    ids:
      - nie
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - config.yaml

checksum:
  name_template: checksums.txt

release:
  mode: keep-existing
  replace_existing_artifacts: true
