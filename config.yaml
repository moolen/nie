mode: enforce
interface:
  mode: auto
dns:
  listen: 127.0.0.1:1053
  upstreams:
    mode: auto
  mark: 4242
trust:
  max_stale_hold: 0s
  sweep_interval: 30s
policy:
  default: deny
  allow:
    - "*.github.com"
    - github.com
  cidr_allow:
    - cidr: 192.0.2.10
      protocol: tcp
    - cidr: 198.51.100.0/24
      protocol: udp
https:
  ports:
    - 443
